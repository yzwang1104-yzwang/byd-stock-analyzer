<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>多股票对比</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3"></script>
<style>body{background:#0f172a;color:#e2e8f0;font-family:system-ui}.sort-arrow{font-size:10px;margin-left:2px}</style></head>
<body class="p-6" x-data="{
  sortKey: 'score',
  sortDir: -1,
  stocks: {{ stocks_json|safe }},
  get sorted() {
    return [...this.stocks].sort((a,b) => {
      let va = a[this.sortKey], vb = b[this.sortKey];
      if (typeof va === 'string') return va.localeCompare(vb) * this.sortDir;
      return (va - vb) * this.sortDir;
    });
  },
  toggle(key) {
    if (this.sortKey === key) this.sortDir *= -1;
    else { this.sortKey = key; this.sortDir = -1; }
  }
}">
<div class="max-w-6xl mx-auto">
<a href="/" class="text-cyan-400 text-sm hover:underline mb-4 inline-block">← 返回</a>
<h1 class="text-xl font-bold mb-4">多股票对比 <span class="text-sm text-slate-500">(点击列头排序)</span></h1>
<div class="overflow-x-auto"><table class="w-full text-sm">
<thead><tr class="text-left text-slate-400 border-b border-slate-700">
<template x-for="[key,label] in [['code','代码'],['price','现价'],['score','评分'],['action','建议'],['direction','方向'],['pe_pct','PE分位'],['pb_pct','PB分位'],['trend','趋势']]" :key="key">
<th class="p-2 cursor-pointer hover:text-white" @click="toggle(key)">
<span x-text="label"></span>
<span class="sort-arrow" x-show="sortKey===key" x-text="sortDir===1?'▲':'▼'"></span>
</th>
</template>
</tr></thead>
<tbody>
<template x-for="s in sorted" :key="s.code">
<tr class="border-b border-slate-800 hover:bg-slate-800">
<td class="p-2"><a :href="'/stock/'+s.code+'/'" class="text-cyan-400" x-text="s.code"></a></td>
<td class="p-2 text-right" x-text="s.price.toFixed(2)"></td>
<td class="p-2 text-right font-bold" :class="s.score>=70?'text-green-400':s.score>=56?'text-yellow-400':'text-red-400'" x-text="s.score"></td>
<td class="p-2" x-text="s.action"></td>
<td class="p-2" x-text="s.direction"></td>
<td class="p-2 text-right" x-text="(s.pe_pct||50).toFixed(0)+'%'"></td>
<td class="p-2 text-right" x-text="(s.pb_pct||50).toFixed(0)+'%'"></td>
<td class="p-2" x-text="s.trend||''"></td></tr>
</template></tbody></table></div>
<div class="text-center text-xs text-slate-600 mt-6">分析结果仅供参考，不构成任何投资建议。投资有风险，入市需谨慎。</div>
</div></body></html>
